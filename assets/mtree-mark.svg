<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#260a5c" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#sheen)"/>
  <rect x="97.5" y="97.5" width="829" height="829" rx="194.5" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="3"/>

  <!-- glyph: terminal prompt chevron + three parallel lane bars -->
  <g filter="url(#soft)">
    <path d="M278 380 L416 512 L278 644" fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="486" y="404" width="300" height="58" rx="29" fill="#41d365"/>
    <rect x="486" y="483" width="236" height="58" rx="29" fill="#45d8e1"/>
    <rect x="486" y="562" width="172" height="58" rx="29" fill="#7aa9ff"/>
  </g>
</svg>
